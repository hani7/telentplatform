{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profil Club - FOOTOP</title>
  <link rel="icon" href="{% static 'img/core-img/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/tabler-icons.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">

  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }

    .profile-wrapper {
      min-height: 100vh;
      background-image: url("{% static 'img/bg-img/bg-home.jpg' %}");
      background-size: cover; background-position: center;
      position: relative; display: flex; flex-direction: column; align-items: center;
    }
    .profile-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,20,8,0.93) 100%);
      z-index: 0;
    }
    .profile-content {
      position: relative; z-index: 1;
      width: 100%; max-width: 540px;
      padding: 2rem 1.25rem 6rem; box-sizing: border-box;
    }

    .page-header { text-align: center; margin-bottom: 1.8rem; }
    .page-header .logo-wrap { display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .page-header .logo-wrap img { height: 36px; width: auto; }
    .page-header h1 { color: #fff; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .page-header p { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin: 0; }

    .form-card {
      background: rgba(255,255,255,0.07); backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.18); border-radius: 22px;
      padding: 1.6rem 1.25rem;
    }

    .form-label-custom { color: rgba(255,255,255,0.75); font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; display: block; }

    .form-control-custom {
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.22);
      border-radius: 12px; color: #fff; padding: 0.65rem 1rem;
      width: 100%; font-size: 0.92rem; box-sizing: border-box;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-control-custom::placeholder { color: rgba(255,255,255,0.4); }
    .form-control-custom:focus { outline: none; border-color: #f1b10f; background: rgba(255,255,255,0.13); }

    .msg-bar { border-radius: 12px; padding: 0.65rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; }

    .btn-save {
      border-radius: 50px; padding: 0.75rem; font-weight: 700; font-size: 1rem;
      width: 100%; border: none; background: #f1b10f; color: #000;
      transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-save:hover { background: #d9a00d; }

    .btn-dashboard {
      display: block; text-align: center; margin-top: 1rem;
      color: rgba(255,255,255,0.6); font-size: 0.88rem; text-decoration: none; transition: color 0.2s;
    }
    .btn-dashboard:hover { color: #f1b10f; }

    .footer-outer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: transparent;
      padding: 4px 14px calc(4px + env(safe-area-inset-bottom));
      z-index: 999; display: flex; justify-content: center;
    }
    .footer-pill {
      background: #1db95b; border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; width: 100%; max-width: 500px;
    }
    .footer-pill-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: rgba(255,255,255,0.82); text-decoration: none;
      font-size: 0.67rem; font-weight: 500; padding: 4px 14px;
      border-radius: 14px; border: none; transition: all 0.18s ease;
      white-space: nowrap; min-width: 60px;
    }
    .footer-pill-item i { font-size: 1.45rem; line-height: 1; }
    .footer-pill-item.is-active { font-weight: 700; color: #fff; }
    .footer-pill-item:hover { color: #fff; background: rgba(0,0,0,0.12); }
  </style>
</head>

<body>
  <div class="profile-wrapper">
    <div class="profile-overlay"></div>

    <div class="profile-content">

      <div class="page-header">
        <div class="logo-wrap">
          <img src="{% static 'img/core-img/footop-logo-white.png' %}" alt="FOOTOP">
        </div>
        <h1><i class="ti ti-building-stadium" style="color:#f1b10f;"></i> Profil Club</h1>
        <p>Complétez votre profil pour commencer</p>
      </div>

      {% for msg in messages %}
        <div class="msg-bar alert alert-{% if msg.tags == 'success' %}success{% elif msg.tags == 'error' %}danger{% else %}info{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}

      <div class="form-card">
        <form method="post">
          {% csrf_token %}

          <div class="row g-3">
            <div class="col-12">
              <span class="form-label-custom">Nom du club</span>
              <input class="form-control-custom" name="club_name"
                     value="{{ form.club_name.value|default:'' }}"
                     placeholder="Ex: JS Kabylie, MC Alger...">
            </div>
            <div class="col-12">
              <span class="form-label-custom">Fonction</span>
              <input class="form-control-custom" name="function"
                     value="{{ form.function.value|default:'' }}"
                     placeholder="Ex: Président, Directeur sportif, Recruteur...">
            </div>
          </div>

          <button type="submit" class="btn-save">
            <i class="ti ti-device-floppy"></i> Enregistrer
          </button>
        </form>

        <a href="{% url 'clubs:dashboard' %}" class="btn-dashboard">
          <i class="ti ti-layout-dashboard"></i> Aller au Tableau de bord →
        </a>
      </div>

    </div>
  </div>

  <div class="footer-outer">
    <nav class="footer-pill">
      <a href="/clubs/dashboard/" class="footer-pill-item"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
      <a href="/clubs/me/" class="footer-pill-item is-active"><i class="ti ti-user-circle"></i><span>Profil</span></a>
      <a href="/offers/suggestions/" class="footer-pill-item"><i class="ti ti-clipboard-list"></i><span>Offres</span></a>
      <a href="/accounts/logout/" class="footer-pill-item"><i class="ti ti-logout"></i><span>Déconnexion</span></a>
    </nav>
  </div>

  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
